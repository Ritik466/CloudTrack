services:
  db:
    image: postgres:16-alpine
    container_name: cloudtrack_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: simple_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: cloudtrack_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: simple_demo
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3001
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: cloudtrack_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
